schema: spec-driven

context: |
  專案性質：一個 3D 第三人稱 · Action-Roguelite 風格的微型戰鬥原型，聚焦「一個技能做到位」的戰鬥手感。

  技術棧：Unreal Engine 5、Gameplay Ability System (GAS)、C++ 為主 + Blueprint、UMG。

  範圍原則（重要）：只做一個核心戰鬥迴圈。
  - MVP：第三人稱角色 + GAS 火球技能（魔力消耗 + 冷卻）+ 會受擊/有生命值的訓練假人。
  - 規劃中（GDD 寫但先不實作）：彈反機制（假人發射投射物，玩家限時彈回）。

  明確不做：連線多人、關卡生成、存檔、敵人 AI。

# Per-artifact rules (optional)
rules:
  proposal:
    - 用繁體中文台灣用語
    - 範圍要小，明確列出「不做」的項目
  tasks:
    - 每個任務拆到可在 2 小時內完成
    - 標註哪些是 UE 編輯器內操作（spectra 無法代跑），哪些是可寫的 C++/設定檔
