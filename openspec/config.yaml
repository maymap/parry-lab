schema: spec-driven

context: |
  專案性質：求職作品集用的微型遊戲 demo（低完成度原型即可），目標是應徵一家做
  「3D 第三人稱 · 動漫風 · Action-Roguelite · 技能/彈反戰鬥」遊戲公司的遊戲開發/企劃職位。
  參考作品：《無盡愛麗絲》（4 人合作 roguelite、多角色技能）、《靈能哨衛：無限》（彈反/反擊機制）。

  技術棧：Unreal Engine 5、Gameplay Ability System (GAS)、Blueprint 為主、少量 C++、UMG。
  開發者背景：4+ 年後端/全端工程師（TypeScript/Node），遊戲與 UE5 為新領域，邊學邊做。

  Demo 範圍原則（重要）：一週內做得完、只做一個核心戰鬥迴圈。
  - MVP：第三人稱角色 + GAS 火球技能（魔力消耗 + 冷卻）+ 會受擊/有血條的訓練假人。
  - 規劃中（GDD 寫但先不實作）：彈反機制（假人發射投射物，玩家限時彈回）——呼應《靈能哨衛》。

  明確不做：連線多人、關卡生成、存檔、敵人 AI。用文件展示視野，用小 demo 證明動手能力。

# Per-artifact rules (optional)
rules:
  proposal:
    - 用繁體中文台灣用語
    - 範圍要小，明確列出「不做」的項目
  tasks:
    - 每個任務拆到可在 2 小時內完成
    - 標註哪些是 UE 編輯器內操作（spectra 無法代跑），哪些是可寫的 C++/設定檔
